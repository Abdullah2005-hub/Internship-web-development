<!DOCTYPE html>
<html>

<head>
<title>Dark Mode Toggle</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    margin-top:100px;
    background-color:white;
    color:black;
}

.dark{
    background-color:black;
    color:white;
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

</style>

</head>

<body>

<h1>Dark Mode Example</h1>

<button onclick="toggleMode()">Toggle Dark Mode</button>

<script>

function toggleMode(){

    document.body.classList.toggle("dark");

}

</script>

</body>

</html>
